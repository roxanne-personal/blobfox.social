<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Main Club</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="starfield"></div>
    
    <div class="container">
        <header>
            <h1>the main club</h1>
            <p class="subtitle">meet the goobers</p>
        </header>

        <main class="members-grid">
            <div class="member">
                <div class="member-header">
                    <img src="images/linkzzpfp.png" alt="Linkzz" class="avatar">
                    <h2>Linkzz</h2>
                </div>
                <p class="bio">a strange individual, with an obsession with pokemon and da kiggies (kitty)</p>
                <div class="sites">
                    <p><strong>sites:</strong></p>
                    <ul>
                        <li><a href="https://blobfox.space" id="play-sound">> blobfox.space</a></li>
                    </ul>
                </div>
            </div>

            </main>

        <footer>
            <p>best viewed in netscape navigator 4.0 | last updated: 2026</p>
        </footer>
    </div>

    <audio id="goober-audio" src="sounds/linkzzclick.mp3"></audio>

    <script>
        document.getElementById('play-sound').addEventListener('click', function(event) {
            event.preventDefault(); // Stops the '#' from jumping the page to the top
            const audio = document.getElementById('goober-audio');
            
            // If it's already playing, reset it to the beginning
            audio.currentTime = 0; 
            
            audio.play().catch(function(error) {
                console.log("Playback failed. Ensure the filename and extension are exactly correct.", error);
            });
        });
    </script>
</body>
</html>
